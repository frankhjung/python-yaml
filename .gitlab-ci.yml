---
# https://hub.docker.com/r/library/python/tags/
image: python:3.13

variables:
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"

cache:
  paths:
    - .cache/uv

before_script:
  - curl -LsSf https://astral.sh/uv/install.sh | sh
  - export PATH="$HOME/.local/bin:$PATH"
  - uv sync --all-extras --dev
  - uv run python --version
  - uv --version
  - uv run ruff --version
  - uv run pylint --version
  - uv run yamllint --version

build:
  stage: build
  except: [tags]
  script:
    - echo check ...
    - uv run ruff check read_yaml.py employees/*.py utils/*.py tests/*.py
    - uv run ruff format --check read_yaml.py employees/*.py utils/*.py tests/*.py
    - uv run pylint read_yaml.py employees/*.py utils/*.py tests/*.py
    - uv run yamllint --strict tests/*.yaml
    - echo test ...
    - uv run pytest -v --cov-report term-missing --cov=employees tests/
    - echo run ...
    - uv run python -m read_yaml -h
    - uv run python -m read_yaml --version
    - uv run python -m read_yaml -v tests/test.yaml

pages:
  stage: deploy
  only: [master]
  except: [tags]
  script:
    - echo document ...
    - uv run pytest -v --html=cover/report.html --cov=employees --cov-report=html:cover tests/
    - uv run coverage html -d cover employees/employees.py
    - cd docs && uv run make html && cd ..
    - mv target/docs/html public
  artifacts:
    paths:
      - public
